<!DOCTYPE html>
<html>
<head>
  <title>CHW Simulation System</title>
  <style>
    body { font-family: Arial; }
    #log { border:1px solid #000; padding:10px; height:220px; overflow:auto; }
    #scores { border:1px solid #444; padding:8px; margin-top:8px; }
    #patient { border:1px solid #888; padding:8px; margin-top:8px; }
  </style>
</head>

<body>

<h2>CHW Simulation System (Debug Mode)</h2>

<select id="scenarioSelect" onchange="loadScenario()">
  <option value="ashley">Ashley (Methamphetamine)</option>
  <option value="maria">Maria (Postpartum Depression)</option>
</select>

<button onclick="startListening()">🎤 Push to Talk</button>

<p id="status">Idle</p>

<div id="patient"></div>

<h3>Conversation Log</h3>
<div id="log"></div>

<h3>C3 Scores</h3>
<div id="scores"></div>

<script>

// =====================
// STATE
// =====================
let recognition = null;
let listening = false;

let emotionalState = { anxiety:0.7, defensiveness:0.6, openness:0.2 };
let c3 = { communication:0, empathy:0, assessment:0, support:0 };

let conversationHistory = [];
let currentPatient = {};

// =====================
// SCENARIOS
// =====================
const scenarios = {
  ashley: {
    name: "Ashley",
    fhir: {
      Patient: { name:"Ashley", age:24, condition:"Methamphetamine Use Disorder" }
    }
  },
  maria: {
    name: "Maria",
    fhir: {
      Patient: { name:"Maria", age:29, condition:"Postpartum Depression" }
    }
  }
};

// =====================
// LOAD
// =====================
function loadScenario() {
  const key = document.getElementById("scenarioSelect").value;
  currentPatient = scenarios[key];
  conversationHistory = [];

  document.getElementById("patient").innerHTML =
    "<b>Patient:</b> " + currentPatient.name +
    "<br><b>Condition:</b> " + currentPatient.fhir.Patient.condition;

  document.getElementById("log").innerHTML = "";
}
loadScenario();

// =====================
// MIC
// =====================
function startListening() {

  if (!recognition) {
    recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";

    recognition.onresult = async (event) => {
      const text = event.results[0][0].transcript;

      logMessage("CHW", text);
      evaluateCHW(text);

      document.getElementById("status").innerText = "Thinking...";
      await processConversation(text);
    };

    recognition.onend = () => {
      listening = false;
      document.getElementById("status").innerText = "Idle";
    };
  }

  if (!listening) {
    listening = true;
    recognition.start();
    document.getElementById("status").innerText = "Listening...";
  }
}

// =====================
// AI CALL (DEBUG)
// =====================
async function processConversation(userInput) {

  try {

    const response = await fetch("https://chw-backend.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        messages: [
          { role:"system", content: buildPrompt() },
          ...conversationHistory,
          { role:"user", content:userInput }
        ]
      })
    });

    console.log("RAW RESPONSE:", response);

    const data = await response.json();

    console.log("PARSED RESPONSE:", data);

    // SHOW RAW RESPONSE ON SCREEN
    document.getElementById("status").innerText =
      JSON.stringify(data).substring(0, 120);

    let aiText = "";

    if (data.choices && data.choices.length > 0) {
      aiText = data.choices[0].message.content;
    } else if (data.error) {
      aiText = "ERROR: " + data.error.message;
    } else {
      aiText = "Unexpected response format";
    }

    conversationHistory.push({role:"user", content:userInput});
    conversationHistory.push({role:"assistant", content:aiText});

    logMessage(currentPatient.name, aiText);
    speak(aiText);

  } catch (err) {
    console.error("FETCH ERROR:", err);
    document.getElementById("status").innerText = "Connection error";
  }

  document.getElementById("status").innerText = "Idle";
}

// =====================
// PROMPT
// =====================
function buildPrompt() {
  return `
You are ${currentPatient.name}, a patient in a CHW session.

Respond clearly and directly first, then add emotion.
Keep answers under 2 sentences.
`;
}

// =====================
// SCORING
// =====================
function evaluateCHW(input) {
  const text = input.toLowerCase();

  if (text.length > 10) c3.communication++;
  if (text.includes("feeling")) c3.empathy += 2;
  if (text.includes("when")) c3.assessment += 2;
  if (text.includes("help")) c3.support += 2;

  updateScores();
}

function updateScores(){
  document.getElementById("scores").innerHTML = `
  Communication: ${c3.communication}<br>
  Empathy: ${c3.empathy}<br>
  Assessment: ${c3.assessment}<br>
  Support: ${c3.support}
  `;
}

// =====================
// VOICE
// =====================
function speak(text){

  function setVoice(){
    const voices = speechSynthesis.getVoices();

    let voice =
      voices.find(v => v.name.includes("Female")) ||
      voices[0];

    const utter = new SpeechSynthesisUtterance(text);
    utter.voice = voice;
    utter.rate = 0.92;
    utter.pitch = 0.85;

    speechSynthesis.speak(utter);
  }

  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = setVoice;
  } else {
    setVoice();
  }
}

// =====================
// LOG
// =====================
function logMessage(role,text){
  const log = document.getElementById("log");
  const p = document.createElement("p");
  p.innerHTML = "<b>"+role+":</b> "+text;
  log.appendChild(p);
  log.scrollTop = log.scrollHeight;
}

</script>

</body>
</html>
